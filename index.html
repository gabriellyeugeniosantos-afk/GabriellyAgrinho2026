<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de Gado Automatizado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Contador de Gado por Imagem (Visão Computacional)</h2>
    
    <div id="status" class="status">Carregando inteligência do OpenCV.js... Aguarde.</div>
    
    <input type="file" id="upload-imagem" accept="image/*" disabled>
    
    <div class="resultado-container">
        <div>
            <h3>1. Imagem Original</h3>
            <img id="imagem-original" alt="Sua imagem aparecerá aqui">
        </div>
        <div>
            <h3>2. Resultado da Contagem</h3>
            <canvas id="canvas-resultado"></canvas>
        </div>
    </div>
</div>

<script async src="https://docs.opencv.org/4.11.0/opencv.js" type="text/javascript" id="opencv-script"></script>
<script src="script.js"></script>

</body>
